description: Telit LE910Cx Linux Modem

compatible: "telit,le910cx-le"

include: zephyr,cellular-modem-device.yaml

properties:
  mdm-power-gpios:
    type: phandle-array
    required: true

  mdm-reset-gpios:
    type: phandle-array
    required: true

  zephyr,mdm-reset-behavior:
    default: ["toggle_on_recovery", "toggle_on_resume"]

  target-speed:
    type: int
    default: 921600
    description:
      UART baudrate which will be requested using AT commands and to which
      UART interface will be reconfigured during initialization phase.
